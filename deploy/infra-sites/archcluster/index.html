<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archcluster Console</title>
  <style>
    :root {
      --bg: #f4f7f6;
      --panel: #fff;
      --ink: #19252d;
      --muted: #5e6a74;
      --border: #d9e3e8;
      --ok: #199869;
      --warn: #c97a1d;
      --bad: #c64242;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #edf7f3 0, #f7fbfa 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1020px, 95vw);
      margin: 18px auto 30px;
      display: grid;
      gap: 12px;
    }

    .hero, .panel, .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(20, 34, 41, 0.08);
    }

    .hero {
      padding: 14px;
      background: linear-gradient(135deg, #134a3f, #1d7563);
      color: #edfffa;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(22px, 3.2vw, 32px);
    }

    .hero p {
      margin: 6px 0 0;
      color: #cdf8ea;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      color: #fff;
      background: rgba(255,255,255,0.14);
      cursor: pointer;
    }

    .pill {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .ok { background: #dcf7ea; color: var(--ok); }
    .warn { background: #fff3df; color: var(--warn); }
    .bad { background: #ffe1e1; color: var(--bad); }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
    }

    .card {
      padding: 10px;
      min-height: 98px;
    }

    .k {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .v {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .s {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      padding: 12px;
    }

    pre {
      margin: 0;
      max-height: 300px;
      overflow: auto;
      background: #f8fcff;
      border: 1px solid #e6eef4;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      color: #214052;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>archcluster.riff.cc</h1>
      <p>Neverust cluster control surface (IPFS Cluster-compatible API lens).</p>
      <div class="controls">
        <button id="refreshBtn">Refresh</button>
        <span id="health" class="pill warn">Checking</span>
        <span id="status">Booting...</span>
      </div>
    </section>

    <section class="grid">
      <article class="card"><div class="k">Cluster Pins</div><div id="pins" class="v">-</div><div class="s">/api/ipfs-cluster/v1/pins</div></article>
      <article class="card"><div class="k">Allocations</div><div id="allocs" class="v">-</div><div class="s">/api/ipfs-cluster/v1/allocations</div></article>
      <article class="card"><div class="k">Node Health</div><div id="nodeHealth" class="v">-</div><div class="s">/health</div></article>
    </section>

    <section class="panel">
      <h3 style="margin:0 0 8px;">Pins JSON</h3>
      <pre id="pinsRaw">[]</pre>
    </section>

    <section class="panel">
      <h3 style="margin:0 0 8px;">Allocations JSON</h3>
      <pre id="allocsRaw">[]</pre>
    </section>
  </main>

  <script>
    async function getJson(path) {
      const res = await fetch(path, { headers: { "accept": "application/json" } });
      if (!res.ok) throw new Error(path + " -> HTTP " + res.status);
      return res.json();
    }

    async function refresh() {
      const healthPill = document.getElementById("health");
      const status = document.getElementById("status");
      healthPill.className = "pill warn";
      healthPill.textContent = "Checking";
      try {
        const [pins, allocs, health] = await Promise.all([
          getJson("/api/ipfs-cluster/v1/pins"),
          getJson("/api/ipfs-cluster/v1/allocations"),
          getJson("/health")
        ]);

        const pinCount = Array.isArray(pins) ? pins.length : 0;
        const allocCount = Array.isArray(allocs) ? allocs.length : 0;

        document.getElementById("pins").textContent = String(pinCount);
        document.getElementById("allocs").textContent = String(allocCount);
        document.getElementById("nodeHealth").textContent = health.status || "unknown";
        document.getElementById("pinsRaw").textContent = JSON.stringify(pins, null, 2);
        document.getElementById("allocsRaw").textContent = JSON.stringify(allocs, null, 2);

        healthPill.className = "pill ok";
        healthPill.textContent = "Online";
        status.textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (err) {
        healthPill.className = "pill bad";
        healthPill.textContent = "Offline";
        status.textContent = err.message || String(err);
      }
    }

    document.getElementById("refreshBtn").onclick = refresh;
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
