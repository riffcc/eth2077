<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archivist Node Console</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --ink: #1a2330;
      --muted: #5b6676;
      --border: #dce3ee;
      --accent: #1f6fbf;
      --ok: #169769;
      --warn: #c47a25;
      --bad: #c43f3f;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #ecf3fc 0, #f7fafc 30%, #f7fafc 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1040px, 95vw);
      margin: 18px auto 32px;
      display: grid;
      gap: 12px;
    }

    .head, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(32, 53, 74, 0.08);
    }

    .head {
      padding: 14px;
      background: linear-gradient(140deg, #0f3656, #1a5f91);
      color: #eef7ff;
    }

    .head h1 {
      margin: 0;
      font-size: clamp(22px, 3.4vw, 34px);
    }

    .head p {
      margin: 6px 0 0;
      color: #c8e4ff;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
    }

    .pill {
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 700;
      font-size: 12px;
      display: inline-block;
    }

    .ok { background: #ddf6ec; color: var(--ok); }
    .warn { background: #fff2df; color: var(--warn); }
    .bad { background: #ffe1e1; color: var(--bad); }

    .cards {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      min-height: 92px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      padding: 12px;
    }

    pre {
      margin: 0;
      max-height: 280px;
      overflow: auto;
      padding: 10px;
      background: #f8fbff;
      border-radius: 10px;
      border: 1px solid #e7eef8;
      font-size: 12px;
      color: #23415f;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
    }

    @media (max-width: 520px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="head">
      <h1>archivist.riff.cc</h1>
      <p>Archivist node interface powered by the local Archivist daemon API.</p>
      <div class="controls">
        <button id="refreshBtn">Refresh</button>
        <span id="health" class="pill warn">Checking</span>
        <span id="status">Booting...</span>
      </div>
    </section>

    <section class="cards">
      <article class="card"><div class="label">Peer ID</div><div id="peer" class="value" style="font-size:16px;line-height:1.3;">-</div><div class="sub">/api/archivist/v1/peerid</div></article>
      <article class="card"><div class="label">Blocks</div><div id="blocks" class="value">-</div><div id="blocksSub" class="sub">/api/archivist/v1/space</div></article>
      <article class="card"><div class="label">Storage Used</div><div id="storage" class="value">-</div><div id="storageSub" class="sub">quotaUsedBytes</div></article>
      <article class="card"><div class="label">Quota</div><div id="quota" class="value">-</div><div id="quotaSub" class="sub">quotaMaxBytes</div></article>
    </section>

    <section class="panel">
      <h3 style="margin:0 0 8px;">Debug Snapshot</h3>
      <pre id="raw">{"status":"loading"}</pre>
    </section>
  </main>

  <script>
    async function getJson(path) {
      const sep = path.includes("?") ? "&" : "?";
      const url = `${path}${sep}_=${Date.now()}`;
      const res = await fetch(url, {
        cache: "no-store",
        headers: {
          "accept": "application/json",
          "cache-control": "no-cache"
        }
      });
      const raw = await res.text();
      if (!res.ok) throw new Error(path + " -> HTTP " + res.status);
      try {
        return JSON.parse(raw);
      } catch (_err) {
        throw new Error(path + " -> non-JSON response: " + raw.slice(0, 80));
      }
    }

    function fmtBytes(n) {
      const v = Number(n || 0);
      if (v < 1024) return v + " B";
      if (v < 1024 * 1024) return (v / 1024).toFixed(1) + " KiB";
      if (v < 1024 * 1024 * 1024) return (v / (1024 * 1024)).toFixed(2) + " MiB";
      return (v / (1024 * 1024 * 1024)).toFixed(2) + " GiB";
    }

    async function refresh() {
      const healthEl = document.getElementById("health");
      const statusEl = document.getElementById("status");
      healthEl.className = "pill warn";
      healthEl.textContent = "Checking";
      try {
        const [peerInfo, space, debugInfo] = await Promise.all([
          getJson("/api/archivist/v1/peerid"),
          getJson("/api/archivist/v1/space"),
          getJson("/api/archivist/v1/debug/info")
        ]);

        const blocks = Number(space.totalBlocks || 0);
        const quotaUsed = Number(space.quotaUsedBytes || 0);
        const quotaMax = Number(space.quotaMaxBytes || 0);
        const peerId = String(peerInfo.id || "-");

        document.getElementById("peer").textContent = peerId;
        document.getElementById("blocks").textContent = String(blocks);
        document.getElementById("blocksSub").textContent = "repo blocks";
        document.getElementById("storage").textContent = fmtBytes(quotaUsed);
        document.getElementById("storageSub").textContent = "reserved " + fmtBytes(Number(space.quotaReservedBytes || 0));
        document.getElementById("quota").textContent = fmtBytes(quotaMax);
        document.getElementById("quotaSub").textContent = quotaMax > 0 ? (Math.round((quotaUsed / quotaMax) * 100) + "% used") : "quota unavailable";

        document.getElementById("raw").textContent = JSON.stringify({
          peer: peerInfo,
          space,
          debug: debugInfo
        }, null, 2);

        healthEl.className = "pill ok";
        healthEl.textContent = "Online";
        statusEl.textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (err) {
        healthEl.className = "pill bad";
        healthEl.textContent = "Offline";
        statusEl.textContent = err.message || String(err);
      }
    }

    document.getElementById("refreshBtn").onclick = refresh;
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister())).catch(() => {});
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
