services:
  archivist-site:
    image: nginx:alpine
    container_name: eth2077-archivist-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:3104:80"
    volumes:
      - ./archivist:/usr/share/nginx/html:ro

